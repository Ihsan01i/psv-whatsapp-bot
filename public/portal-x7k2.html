<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.75">
  <title>PSV Sports — Secure Lead Export</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script>
    function handleGoogleLogin(response) {
      if (typeof _handleGoogleLogin === 'function') { _handleGoogleLogin(response); }
    }
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-dark: #050505;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #FFB020;
      --accent-glow: rgba(255, 176, 32, 0.35);
      --surface-glass: rgba(255, 255, 255, 0.03);
      --border-glass: rgba(255, 255, 255, 0.08);
      --green: #4ade80;
      --red: #f87171;
      --font-head: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text);
      font-family: var(--font-head);
      min-height: 100vh;
      padding: 40px 24px 80px;
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    html { overflow-x: hidden; }

    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      z-index: -1;
      opacity: 0.6;
      pointer-events: none;
    }

    body::before {
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(255, 176, 32, 0.15), transparent 70%);
      top: -200px;
      right: -150px;
    }

    body::after {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.08), transparent 70%);
      bottom: -100px;
      left: -200px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    h1,
    h2,
    h3 {
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .section-title {
      font-size: 13px;
      font-family: var(--font-mono);
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-weight: 600;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-glass);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px 32px;
      background: var(--surface-glass);
      border: 1px solid var(--border-glass);
      border-radius: 24px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      margin-bottom: 56px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #FFB020, #f59e0b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 24px var(--accent-glow);
      flex-shrink: 0;
    }

    .logo-text h1 {
      font-size: 22px;
      margin-bottom: 2px;
    }

    .logo-text p {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ── Login Overlay ── */
    #login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(5, 5, 5, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #google-signin-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 24px;
      background: #fff;
      color: #3c4043;
      border: 1px solid #dadce0;
      border-radius: 10px;
      font-family: 'Google Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: box-shadow .15s, background .15s;
    }

    #google-signin-btn:hover {
      background: #f8f9fa;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    #google-signin-btn:active {
      background: #f1f3f4;
    }

    .login-card {
      background: rgba(20, 20, 25, 0.7);
      padding: 56px 40px;
      border-radius: 32px;
      border: 1px solid var(--border-glass);
      text-align: center;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #FFB020, #f59e0b, #38bdf8);
    }

    /* ── Summary Row ── */
    .export-all-row {
      background: var(--surface-glass);
      border: 1px solid var(--border-glass);
      border-radius: 28px;
      padding: 36px 40px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 24px;
      margin-bottom: 56px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
    }

    .export-all-info h3 {
      font-size: 18px;
      margin-bottom: 6px;
    }

    .export-all-info p {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .total-badge {
      font-size: 48px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 0 24px rgba(255, 176, 32, 0.4);
      font-family: var(--font-head);
    }

    .btn-export-all {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #FFB020, #f59e0b);
      color: #000;
      border: none;
      border-radius: 14px;
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      padding: 16px 32px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 14px rgba(255, 176, 32, 0.2);
      white-space: nowrap;
    }

    .btn-export-all:hover:not(:disabled) {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px var(--accent-glow);
    }

    .btn-export-all:disabled {
      background: var(--surface-glass);
      color: var(--muted);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ── Cards Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 64px;
    }

    .sport-card {
      background: var(--surface-glass);
      border: 1px solid var(--border-glass);
      border-radius: 28px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .sport-card:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 176, 32, 0.4);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4), 0 0 32px rgba(255, 176, 32, 0.1);
    }

    /* card-left/right used on mobile; on desktop, stack vertically */
    .card-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .card-info {
      min-width: 0;
    }

    .card-right {
      display: contents;
    }

    /* on desktop, children flow normally in flex column */
    .card-top {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .card-emoji {
      font-size: 32px;
      background: rgba(255, 255, 255, 0.03);
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--border-glass);
      box-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.02);
      flex-shrink: 0;
    }

    .card-name {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-key {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
    }

    .card-count {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin: 12px 0 8px;
    }

    .count-num {
      font-size: 44px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .count-num.zero {
      color: var(--muted);
    }

    .count-label {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--muted);
    }

    .btn-download {
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      border: 1px solid var(--border-glass);
      border-radius: 14px;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-download:hover:not(:disabled) {
      background: #FFB020;
      color: #000;
      border-color: #FFB020;
      box-shadow: 0 4px 16px var(--accent-glow);
      transform: scale(1.02);
    }

    .btn-download:active {
      transform: scale(0.98);
    }

    .btn-download:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-download.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    /* ── Log Section ── */
    .log-section {
      background: var(--surface-glass);
      border: 1px solid var(--border-glass);
      border-radius: 28px;
      padding: 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* Desktop table */
    .log-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
    }

    .log-table th {
      text-align: left;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-size: 11px;
      padding: 0 16px 16px;
      border-bottom: 1px solid var(--border-glass);
    }

    .log-table td {
      padding: 20px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      color: #e2e8f0;
      font-size: 13px;
    }

    .log-table tr:last-child td {
      border-bottom: none;
    }

    /* Mobile log cards (hidden on desktop) */
    .log-cards {
      display: none;
    }

    .log-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-glass);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .log-card:last-child {
      margin-bottom: 0;
    }

    .log-card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .log-card-row:last-child {
      margin-bottom: 0;
    }

    .log-card-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .log-card-val {
      color: var(--text);
      font-size: 13px;
    }

    .log-card-file {
      color: var(--muted);
      font-size: 11px;
      word-break: break-all;
      margin-top: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 24px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge.uploaded {
      background: rgba(74, 222, 128, 0.12);
      color: var(--green);
      border: 1px solid rgba(74, 222, 128, 0.2);
    }

    /* ── Utils ── */
    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid var(--border-glass);
      padding: 10px 18px;
      border-radius: 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .refresh-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .refresh-btn.spinning svg {
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .empty {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 14px;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* ── Toasts ── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 10000;
      max-width: calc(100vw - 32px);
    }

    .toast {
      background: rgba(20, 20, 25, 0.95);
      border: 1px solid var(--border-glass);
      color: #fff;
      border-radius: 16px;
      padding: 16px 24px;
      font-family: var(--font-mono);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 280px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      transition: all 0.3s;
      word-break: break-word;
    }

    .toast.success {
      border-color: var(--green);
    }

    .toast.error {
      border-color: var(--red);
    }

    .toast.info {
      border-color: var(--accent);
    }

    @keyframes slideIn {
      from {
        transform: translateX(40px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* ════════════════════════════════════════
       MOBILE RESPONSIVE (FIXED)
    ════════════════════════════════════════ */
    @media (max-width: 640px) {

      body {
        padding: 14px 12px 24px;
      }

      /* ── Header ── */
      header {
        padding: 16px;
        border-radius: 20px;
        margin-bottom: 24px;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .logo {
        gap: 12px;
      }

      .logo-icon {
        width: 44px;
        height: 44px;
        font-size: 20px;
        border-radius: 12px;
      }

      .logo-text h1 {
        font-size: 18px;
      }

      .logo-text p {
        display: block;
        font-size: 11px;
      }

      #user-email {
        display: none;
      }

      .user-row {
        width: 100%;
        justify-content: space-between;
        gap: 8px;
      }

      .refresh-btn {
        padding: 8px 14px;
        font-size: 12px;
        border-radius: 10px;
      }

      /* ── Login card ── */
      .login-card {
        padding: 32px 20px;
        border-radius: 20px;
      }

      /* ── Section titles ── */
      .section-title {
        font-size: 11px;
        letter-spacing: 1.5px;
        margin-bottom: 16px;
      }

      /* ── Summary ── */
      .export-all-row {
        padding: 20px;
        border-radius: 20px;
        margin-bottom: 24px;
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .export-all-info {
        width: 100%;
      }

      .export-all-info h3 {
        font-size: 16px;
        margin-bottom: 4px;
      }

      .export-all-info p {
        font-size: 12px;
      }

      #summary-actions {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        gap: 12px;
      }

      .total-badge {
        font-size: 32px;
        line-height: 1;
      }

      .btn-export-all {
        padding: 12px 16px;
        font-size: 13px;
        border-radius: 12px;
        flex: 1;
      }

      /* ── Cards: compact horizontal rows on mobile ── */
      .cards-grid {
        grid-template-columns: 1fr;
        gap: 8px;
        margin-bottom: 24px;
      }

      .sport-card {
        flex-direction: row;
        align-items: center;
        padding: 12px 14px;
        border-radius: 14px;
        gap: 10px;
      }

      .sport-card:hover {
        transform: none;
        box-shadow: none;
      }

      /* left: emoji + name */
      .card-left {
        flex: 1;
        min-width: 0;
        gap: 10px;
        align-items: center;
      }

      .card-emoji {
        font-size: 18px;
        padding: 6px;
        border-radius: 8px;
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .card-info { min-width: 0; }

      .card-name {
        font-size: 13px;
        margin-bottom: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Hide sport key on mobile — too noisy */
      .card-key { display: none; }

      /* right: count + button */
      .card-right {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }

      .card-count {
        margin: 0;
        flex-direction: column;
        align-items: center;
        gap: 0;
        text-align: center;
        min-width: 32px;
      }

      .count-num {
        font-size: 22px;
        line-height: 1.1;
      }

      .count-label {
        font-size: 9px;
        display: block;
      }

      .btn-download {
        padding: 8px 14px;
        font-size: 12px;
        border-radius: 8px;
        margin-top: 0;
        white-space: nowrap;
      }

      /* ── Log section ── */
      .log-section {
        padding: 20px;
        border-radius: 20px;
      }

      .log-section>div:first-child {
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px !important;
      }

      .log-table {
        display: none;
      }

      .log-cards {
        display: block;
      }

      /* ── Toasts ── */
      #toast-container {
        right: 12px;
        left: 12px;
        max-width: 100%;
        bottom: 20px;
      }

      .toast {
        min-width: unset;
        width: 100%;
        font-size: 13px;
        padding: 14px;
        border-radius: 14px;
      }
    }

    @media (max-width: 400px) {
      .logo-text h1 {
        font-size: 15px;
      }

      .export-all-row {
        padding: 16px;
      }

      .sport-card {
        padding: 14px;
      }
    }

    .export-all-row {
      padding: 12px;
    }

    .sport-card {
      padding: 12px;
    }
    .btn-redownload {
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.35);
      color: #a5b4fc;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-redownload:hover {
      background: rgba(99, 102, 241, 0.3);
      color: #e0e7ff;
    }
    .btn-redownload:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <div id="login-overlay">
    <div class="login-card">
      <div class="logo-icon" style="margin: 0 auto 16px;">🏆</div>
      <h2 style="margin-bottom: 8px;">Admin Portal</h2>
      <p style="color:var(--muted); font-family:var(--font-mono); font-size:13px; margin-bottom: 24px;">
        Sign in with your authorized Google account to continue.
      </p>
      <div id="g_id_onload" data-client_id="355609399092-n109let01cv75b7iaif6pokffh0sn03m.apps.googleusercontent.com"
        data-context="signin" data-ux_mode="popup" data-callback="handleGoogleLogin" data-auto_prompt="false">
      </div>
      <button id="google-signin-btn" onclick="googleSignIn()">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
            fill="#4285F4" />
          <path
            d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"
            fill="#34A853" />
          <path
            d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"
            fill="#FBBC05" />
          <path
            d="M9 3.583c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962L3.964 6.294C4.672 4.167 6.656 3.583 9 3.583z"
            fill="#EA4335" />
        </svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <div class="container" id="main-app" style="display: none;">

    <header>
      <div class="logo">
        <div class="logo-icon">🏆</div>
        <div class="logo-text">
          <h1>PSV Sports Academy</h1>
          <p>Lead Export Dashboard</p>
        </div>
      </div>
      <div class="user-row" id="user-info">
        <span id="user-email" style="font-size:12px;font-family:var(--font-mono);color:var(--muted);"></span>
        <button id="refresh-btn" class="refresh-btn" onclick="loadAll()" title="Refresh">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M1 4v6h6M23 20v-6h-6" />
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15" />
          </svg>
          <span class="btn-label">Refresh</span>
        </button>
        <button class="refresh-btn" onclick="logout()">Logout</button>
      </div>
    </header>

    <p class="section-title">Summary</p>
    <div class="export-all-row">
      <div class="export-all-info">
        <h3>All Pending Leads</h3>
        <p id="total-sub">Loading…</p>
      </div>
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;width:100%;" id="summary-actions">
        <span class="total-badge" id="total-count">—</span>
        <button class="btn-export-all" id="btn-all" onclick="exportLeads('all', this)">
          ⬇ Export All as CSV
        </button>
      </div>
    </div>

    <p class="section-title">By Sport</p>
    <div class="cards-grid" id="cards-grid"></div>

    <div class="log-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;">
        <p class="section-title" style="margin:0">Recent Exports</p>
        <button class="refresh-btn" onclick="loadAll()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M1 4v6h6M23 20v-6h-6" />
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15" />
          </svg>
          Refresh
        </button>
      </div>
      <div id="log-container">
        <div class="empty">
          <div class="empty-icon">📋</div>No exports yet this session
        </div>
      </div>
    </div>

  </div>

  <div id="toast-container"></div>

  <script>
    const BASE_URL = window.location.hostname === "localhost" ? "http://localhost:3000" : "";

    const SPORTS = [
      { key: "Badminton - Coaching", aliases: ["badminton_coaching", "Badminton Coaching"], name: "Badminton Coaching", emoji: "🏸" },
      { key: "Badminton - Court Booking", aliases: ["badminton_court", "Court Booking"], name: "Court Booking", emoji: "🏟️" },
      { key: "Archery", aliases: ["archery"], name: "Archery", emoji: "🏹" },
      { key: "Basketball", aliases: ["basketball"], name: "Basketball", emoji: "🏀" },
      { key: "Roller Skating", aliases: ["roller_skating"], name: "Roller Skating", emoji: "🛼" },
    ];

    let counts = {};
    let exportLog = [];

    const fetchAuth = (url, options = {}) => fetch(url, { ...options, credentials: "include" });

    function escapeHTML(str) {
      return String(str || "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#x27;");
    }

    function toast(msg, type = "info") {
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      const icon = type === "success" ? "✅" : type === "error" ? "❌" : "ℹ️";
      el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
      document.getElementById("toast-container").appendChild(el);
      setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateX(20px)";
        setTimeout(() => el.remove(), 300);
      }, 3500);
    }

    async function _handleGoogleLogin(response) {
      try {
        const res = await fetchAuth(`${BASE_URL}/api/admin/google-login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ credential: response.credential })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Login failed");
        document.getElementById("user-email").textContent = data.email;
        document.getElementById("login-overlay").style.display = "none";
        document.getElementById("main-app").style.display = "block";
        toast("Login successful", "success");
        loadAll();
      } catch (err) {
        toast(err.message, "error");
      }
    }

    function googleSignIn() {
      if (typeof google === 'undefined' || !google.accounts) {
        toast("Google Sign-In not available. Please refresh.", "error");
        return;
      }
      google.accounts.id.prompt((notification) => {
        if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
          toast("Sign-in blocked by browser. Try disabling shields for this site.", "error");
        }
      });
    }

    async function logout() {
      try { await fetchAuth(`${BASE_URL}/api/admin/logout`, { method: "POST" }); } catch (_) { }
      document.getElementById("login-overlay").style.display = "flex";
      document.getElementById("main-app").style.display = "none";
      if (typeof google !== "undefined") google.accounts.id.disableAutoSelect();
      toast("Logged out successfully", "info");
    }

    function handleUnauthorized(res) {
      if (res.status === 401 || res.status === 403) {
        logout();
        throw new Error("Session expired. Please log in again.");
      }
    }

    async function loadCounts() {
      try {
        const res = await fetchAuth(`${BASE_URL}/api/admin/export-count?sport=all`);
        handleUnauthorized(res);
        if (!res.ok) throw new Error("Could not load counts");
        const data = await res.json();
        const rawBreakdown = data.breakdown || {};
        counts = {};
        Object.entries(rawBreakdown).forEach(([k, v]) => {
          if (!k || k === "null" || k === "undefined") return;
          const match = SPORTS.find(s => s.key === k || (s.aliases && s.aliases.includes(k)));
          const finalKey = match ? match.key : k;
          counts[finalKey] = (counts[finalKey] || 0) + v;
        });
        renderSummary(data.total || 0);
        renderCards(counts);
      } catch (err) {
        toast(err.message, "error");
        renderCards({});
      }
    }

    function renderSummary(total) {
      document.getElementById("total-count").textContent = total;
      document.getElementById("total-sub").textContent = total === 0
        ? "All leads exported — nothing pending"
        : `${total} lead${total !== 1 ? "s" : ""} waiting to be exported`;
    }

    function renderCards(breakdown) {
      const grid = document.getElementById("cards-grid");
      grid.innerHTML = "";

      SPORTS.forEach((sport) => {
        const count = breakdown[sport.key] || 0;
        const card = document.createElement("div");
        card.className = "sport-card";
        card.id = `card-${escapeHTML(sport.key)}`;
        card.innerHTML = `
          <div class="card-left">
            <span class="card-emoji">${sport.emoji}</span>
            <div class="card-info">
              <div class="card-name">${escapeHTML(sport.name)}</div>
              <div class="card-key">${escapeHTML(sport.key)}</div>
            </div>
          </div>
          <div class="card-right">
            <div class="card-count">
              <span class="count-num ${count === 0 ? "zero" : ""}" id="count-${escapeHTML(sport.key)}">${count}</span>
              <span class="count-label">leads</span>
            </div>
            <button class="btn-download" id="btn-${escapeHTML(sport.key)}"
              onclick="exportLeads('${escapeHTML(sport.key)}', this)" ${count === 0 ? "disabled" : ""}>
              ⬇ CSV
            </button>
          </div>`;
        grid.appendChild(card);
      });
    }

    function tsFilename(sportKey) {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      const date = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}`;
      const time = `${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      return `psv_leads_${sportKey}_${date}_${time}.csv`;
    }

    function sportLabel(sportKey) {
      if (sportKey === "all") return "All Sports";
      const s = SPORTS.find(s => s.key === sportKey);
      return s ? `${s.emoji} ${s.name}` : sportKey;
    }

    function formatSportBreakdown(breakdown = {}) {
      return Object.entries(breakdown)
        .filter(([, count]) => Number(count) > 0)
        .map(([key, count]) => `${sportLabel(key)} (${count})`)
        .join(", ");
    }

    function normalizeExportEntry(entry) {
      const createdAt = entry.createdAt ? new Date(entry.createdAt) : new Date();
      return {
        date: createdAt.toLocaleDateString("en-IN"),
        time: createdAt.toLocaleTimeString("en-IN"),
        sport: entry.sport || "all",
        count: Number(entry.count || 0),
        breakdown: entry.breakdown || {},
        filename: entry.filename || "—",
        status: entry.status || "exported",
      };
    }

    async function loadRecentExports() {
      try {
        const res = await fetchAuth(`${BASE_URL}/api/admin/recent-exports`);
        handleUnauthorized(res);
        if (!res.ok) throw new Error("Could not load recent exports");
        const data = await res.json();
        const oldLog = exportLog;
        exportLog = (data.exports || []).map(entry => {
          const norm = normalizeExportEntry(entry);
          if (norm.status === "exported") {
             const existing = oldLog.find(o => o.time === norm.time && o.sport === norm.sport && o.csvUrl);
             if (existing) norm.csvUrl = existing.csvUrl;
          }
          return norm;
        });
        renderLog();
      } catch (err) {
        toast(err.message, "error");
      }
    }

    async function exportLeads(sportKey, btn) {
      const originalText = btn.innerHTML;
      const previousCounts = { ...counts };
      btn.classList.add("loading");
      btn.innerHTML = "⏳ Downloading…";
      const now = new Date();
      const timeStr = now.toLocaleTimeString("en-IN");
      const dateStr = now.toLocaleDateString("en-IN");
      try {
        const url = `${BASE_URL}/api/admin/export-leads?sport=${encodeURIComponent(sportKey)}`;
        const res = await fetchAuth(url);
        handleUnauthorized(res);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }
        const leadCount = parseInt(res.headers.get("X-Lead-Count") || "0", 10);
        const blob = await res.blob();
        const dlUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        // Always use a timestamped filename — prefer server header but fall back to generated one
        const serverFilename = res.headers.get("Content-Disposition")?.match(/filename="(.+)"/)?.[1];
        const filename = serverFilename || tsFilename(sportKey);
        a.href = dlUrl; a.download = filename;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        // Keep a persistent blob URL for re-download (store on exportLog entry)
        const csvUrl = URL.createObjectURL(blob);

        if (leadCount === 0) {
          toast(`No pending leads for ${sportLabel(sportKey)}`, "info");
          exportLog.unshift({
            time: timeStr,
            date: dateStr,
            sport: sportKey,
            count: 0,
            breakdown: sportKey === "all" ? previousCounts : { [sportKey]: 0 },
            filename,
            csvUrl: null,
            status: "empty"
          });
        } else {
          toast(`✓ ${leadCount} lead${leadCount !== 1 ? "s" : ""} downloaded & marked uploaded`, "success");
          if (sportKey === "all") { Object.keys(counts).forEach((k) => { counts[k] = 0; }); }
          else { counts[sportKey] = 0; }
          exportLog.unshift({
            time: timeStr,
            date: dateStr,
            sport: sportKey,
            count: leadCount,
            breakdown: sportKey === "all"
              ? Object.fromEntries(Object.entries(previousCounts).filter(([, count]) => count > 0))
              : { [sportKey]: leadCount },
            filename,
            csvUrl,
            status: "exported"
          });
          renderCards(counts);
          renderSummary(Object.values(counts).reduce((a, b) => a + b, 0));
        }
        renderLog();
        setTimeout(() => loadRecentExports(), 400);
      } catch (err) {
        toast(`Export failed: ${err.message}`, "error");
        exportLog.unshift({ time: timeStr, date: dateStr, sport: sportKey, count: 0, filename: "—", csvUrl: null, status: "error" });
        renderLog();
      } finally {
        btn.classList.remove("loading");
        btn.innerHTML = originalText;
      }
    }

    function statusBadge(status) {
      if (status === "exported") return `<span class="badge uploaded">Exported</span>`;
      if (status === "empty")    return `<span class="badge" style="background:rgba(148,163,184,.1);color:var(--muted);border:1px solid rgba(148,163,184,.2);">Empty</span>`;
      return `<span class="badge" style="background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.2);">Error</span>`;
    }

    function renderLog() {
      const container = document.getElementById("log-container");
      if (exportLog.length === 0) {
        container.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>No exports yet this session</div>`;
        return;
      }

      // Desktop table
      const tableWrap = document.createElement("div");
      // Removed overflowX="auto" to fix internal scrollbar request
      tableWrap.innerHTML = `
          <table class="log-table">
            <thead><tr><th>Date</th><th>Time</th><th>Sport</th><th>Leads</th><th>Selected Sports</th><th>File</th><th>Status</th><th></th></tr></thead>
            <tbody>${exportLog.map((e, i) => `
              <tr>
                <td>${escapeHTML(e.date)}</td>
                <td>${escapeHTML(e.time)}</td>
                <td>${escapeHTML(sportLabel(e.sport))}</td>
                <td>${e.count}</td>
                <td style="font-size:11px;color:var(--muted);">${escapeHTML(formatSportBreakdown(e.breakdown) || "\xe2\x80\x94")}</td>
                <td style="font-size:11px;color:var(--muted);">${escapeHTML(e.filename)}</td>
                <td>${statusBadge(e.status)}</td>
                <td>${e.csvUrl ? `<button class="btn-redownload" onclick="reDownload(exportLog[${i}])">&#8595;</button>` : ''}</td>
              </tr>`).join("")}
          </tbody>
        </table>`;

      // Mobile cards
      const mobileWrap = document.createElement("div");
      mobileWrap.className = "log-cards";
      mobileWrap.innerHTML = exportLog.map((e, i) => `
        <div class="log-card">
          <div class="log-card-row">
            <div>
              <div class="log-card-label">Sport</div>
              <div class="log-card-val">${escapeHTML(sportLabel(e.sport))}</div>
            </div>
            ${statusBadge(e.status)}
          </div>
          <div class="log-card-row">
            <div>
              <div class="log-card-label">Leads</div>
              <div class="log-card-val">${e.count}</div>
            </div>
            <div style="text-align:right">
              <div class="log-card-label">Date / Time</div>
              <div class="log-card-val">${escapeHTML(e.date)} ${escapeHTML(e.time)}</div>
            </div>
          </div>
          <div class="log-card-file">Selected: ${escapeHTML(formatSportBreakdown(e.breakdown) || "\xe2\x80\x94")}</div>
          <div class="log-card-file">${escapeHTML(e.filename)}</div>
          ${e.csvUrl ? `<button class="btn-redownload" style="margin-top:10px;width:100%;text-align:center" onclick="reDownload(exportLog[${i}])">&#8595; Re-download CSV</button>` : ''}
        </div>`).join("");

      container.innerHTML = "";
      container.appendChild(tableWrap);
      container.appendChild(mobileWrap);
    }

    async function loadAll() {
      const btn = document.getElementById("refresh-btn");
      btn?.classList.add("spinning");
      await Promise.all([loadCounts(), loadRecentExports()]);
      btn?.classList.remove("spinning");
    }

    function reDownload(entry) {
      if (!entry || !entry.csvUrl) return;
      const a = document.createElement("a");
      a.href = entry.csvUrl;
      a.download = entry.filename || "psv_leads_export.csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    async function init() {
      try {
        const res = await fetchAuth(`${BASE_URL}/api/admin/session`);
        if (res.ok) {
          const data = await res.json();
          document.getElementById("user-email").textContent = data.email || "Admin";
          document.getElementById("login-overlay").style.display = "none";
          document.getElementById("main-app").style.display = "block";
          loadAll();
        } else { throw new Error("No session"); }
      } catch (_) {
        document.getElementById("login-overlay").style.display = "flex";
        document.getElementById("main-app").style.display = "none";
        renderCards({});
        renderSummary(0);
      }
    }

    init();
  </script>
</body>

</html>
