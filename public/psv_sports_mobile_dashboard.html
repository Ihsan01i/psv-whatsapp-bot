<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PSV Sports — Lead Export</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>function handleGoogleLogin(r){if(typeof _handleGoogleLogin==='function')_handleGoogleLogin(r)}</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#050505;--text:#f8fafc;--muted:#94a3b8;
--accent:#FFB020;--accent-glow:rgba(255,176,32,.3);
--surf:rgba(255,255,255,.04);--brd:rgba(255,255,255,.09);
--green:#4ade80;--red:#f87171;
--fh:'Outfit',sans-serif;--fm:'JetBrains Mono',monospace;
}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:var(--fh);min-height:100vh;padding:0 0 40px;-webkit-font-smoothing:antialiased}

/* ── fixed top bar ── */
#topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:rgba(5,5,5,.92);
  border-bottom:1px solid var(--brd);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#FFB020,#f59e0b);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text h1{font-size:15px;font-weight:700;letter-spacing:-.3px}
.logo-text p{font-size:10px;color:var(--muted);font-family:var(--fm)}
.top-actions{display:flex;align-items:center;gap:8px}
.icon-btn{background:var(--surf);border:1px solid var(--brd);color:var(--text);border-radius:9px;padding:7px 12px;font-family:var(--fm);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:.15s}
.icon-btn:hover{background:rgba(255,255,255,.08)}
.icon-btn svg{width:13px;height:13px;flex-shrink:0}

/* ── login overlay ── */
#login-overlay{
  position:fixed;inset:0;background:rgba(5,5,5,.9);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;
}
.login-card{
  background:rgba(18,18,22,.9);padding:40px 24px;border-radius:24px;
  border:1px solid var(--brd);text-align:center;max-width:360px;width:100%;
  position:relative;overflow:hidden;
}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#FFB020,#38bdf8)}
.login-card h2{font-size:20px;margin-bottom:6px}
.login-card p{font-size:12px;color:var(--muted);font-family:var(--fm);margin-bottom:24px;line-height:1.5}
#google-signin-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
  padding:13px 20px;background:#fff;color:#3c4043;border:1px solid #dadce0;
  border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:.15s;
}
#google-signin-btn:hover{background:#f8f9fa;box-shadow:0 2px 8px rgba(0,0,0,.12)}

/* ── main scroll area ── */
#main-app{display:none;padding:16px}

/* ── section label ── */
.sec-label{
  font-size:10px;font-family:var(--fm);color:var(--accent);
  text-transform:uppercase;letter-spacing:2px;font-weight:600;
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--brd)}

/* ── summary banner ── */
.summary-card{
  background:var(--surf);border:1px solid var(--brd);border-radius:18px;
  padding:18px;margin-bottom:20px;
}
.summary-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.summary-top h3{font-size:15px;font-weight:700}
#total-sub{font-size:11px;color:var(--muted);font-family:var(--fm);margin-top:3px}
.total-badge{font-size:38px;font-weight:800;color:#fff;line-height:1}
.btn-export-all{
  display:flex;align-items:center;justify-content:center;gap:7px;width:100%;
  background:linear-gradient(135deg,#FFB020,#f59e0b);color:#000;
  border:none;border-radius:12px;font-family:var(--fh);font-size:14px;font-weight:700;
  padding:14px;cursor:pointer;transition:.2s;margin-top:12px;
}
.btn-export-all:active{transform:scale(.98)}
.btn-export-all:disabled{background:var(--surf);color:var(--muted);cursor:not-allowed}

/* ── sport cards (stacked list) ── */
.sport-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.sport-card{
  background:var(--surf);border:1px solid var(--brd);border-radius:14px;
  padding:14px 14px;display:flex;align-items:center;gap:12px;
  transition:.15s;
}
.sport-card:active{background:rgba(255,255,255,.07)}
.card-emoji{
  width:40px;height:40px;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid var(--brd);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.card-info{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-key{font-size:10px;font-family:var(--fm);color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.count-block{text-align:center;min-width:36px}
.count-num{font-size:24px;font-weight:800;color:var(--accent);line-height:1}
.count-num.zero{color:var(--muted)}
.count-label{font-size:9px;font-family:var(--fm);color:var(--muted)}
.btn-dl{
  background:rgba(255,255,255,.05);color:#fff;
  border:1px solid var(--brd);border-radius:9px;
  font-family:var(--fh);font-size:12px;font-weight:700;
  padding:9px 13px;cursor:pointer;transition:.15s;white-space:nowrap;
}
.btn-dl:active{background:#FFB020;color:#000;border-color:#FFB020}
.btn-dl:disabled{opacity:.35;cursor:not-allowed}

/* ── log section ── */
.log-wrap{background:var(--surf);border:1px solid var(--brd);border-radius:18px;padding:16px;overflow:hidden}
.log-entry{
  background:rgba(255,255,255,.025);border:1px solid var(--brd);border-radius:12px;
  padding:14px;margin-bottom:8px;
}
.log-entry:last-child{margin-bottom:0}
.log-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.log-row:last-child{margin-bottom:0}
.log-lbl{font-size:10px;color:var(--muted);font-family:var(--fm);text-transform:uppercase;letter-spacing:.8px}
.log-val{font-size:13px;font-family:var(--fm);color:var(--text)}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.badge.ok{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.badge.empty{background:rgba(148,163,184,.1);color:var(--muted);border:1px solid rgba(148,163,184,.2)}
.badge.err{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.2)}
.btn-redl{
  background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;
  border-radius:8px;padding:6px 12px;font-size:11px;font-family:var(--fm);cursor:pointer;
  transition:.15s;white-space:nowrap;margin-top:8px;width:100%;text-align:center;display:block;
}
.btn-redl:hover{background:rgba(99,102,241,.28);color:#e0e7ff}
.empty-state{text-align:center;padding:40px 16px;color:var(--muted);font-family:var(--fm);font-size:13px}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.5}
#toast-container{position:fixed;bottom:16px;left:12px;right:12px;display:flex;flex-direction:column;gap:8px;z-index:10000}
.toast{
  background:rgba(18,18,22,.97);border:1px solid var(--brd);color:#fff;
  border-radius:14px;padding:13px 16px;font-family:var(--fm);font-size:12px;
  display:flex;align-items:center;gap:10px;
  animation:toastIn .25s ease;
}
.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}.toast.info{border-color:var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning svg{animation:spin .6s linear infinite}
</style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <div style="font-size:32px;margin-bottom:12px">🏆</div>
    <h2>Admin Portal</h2>
    <p>Sign in with your authorized Google account to continue.</p>
    <div id="g_id_onload"
      data-client_id="355609399092-n109let01cv75b7iaif6pokffh0sn03m.apps.googleusercontent.com"
      data-context="signin" data-ux_mode="popup"
      data-callback="handleGoogleLogin" data-auto_prompt="false"></div>
    <button id="google-signin-btn" onclick="googleSignIn()">
      <svg width="17" height="17" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908C16.657 14.175 17.64 11.867 17.64 9.2z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.583c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962L3.964 6.294C4.672 4.167 6.656 3.583 9 3.583z" fill="#EA4335"/></svg>
      Sign in with Google
    </button>
  </div>
</div>

<div id="topbar">
  <div class="logo-row">
    <div class="logo-icon">🏆</div>
    <div class="logo-text">
      <h1>PSV Sports Academy</h1>
      <p>Lead Export</p>
    </div>
  </div>
  <div class="top-actions">
    <button class="icon-btn" id="refresh-btn" onclick="loadAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
    </button>
    <button class="icon-btn" onclick="logout()">Out</button>
  </div>
</div>

<div id="main-app">

  <p class="sec-label" style="margin-top:4px">Summary</p>
  <div class="summary-card">
    <div class="summary-top">
      <div>
        <h3>All Pending Leads</h3>
        <p id="total-sub">Loading…</p>
      </div>
      <span class="total-badge" id="total-count">—</span>
    </div>
    <button class="btn-export-all" id="btn-all" onclick="exportLeads('all',this)">⬇ Export All as CSV</button>
  </div>

  <p class="sec-label">By Sport</p>
  <div class="sport-list" id="cards-grid"></div>

  <p class="sec-label">Recent Exports</p>
  <div class="log-wrap" id="log-wrap">
    <div class="empty-state"><div class="empty-icon">📋</div>No exports yet</div>
  </div>

</div>

<div id="toast-container"></div>

<script>
const BASE_URL = window.location.hostname==="localhost"?"http://localhost:3000":"";

const SPORTS=[
  {key:"Badminton - Coaching",aliases:["badminton_coaching","Badminton Coaching"],name:"Badminton Coaching",emoji:"🏸"},
  {key:"Badminton - Court Booking",aliases:["badminton_court","Court Booking"],name:"Court Booking",emoji:"🏟️"},
  {key:"Badminton - Play Sessions",aliases:["badminton_play_session","Play Sessions"],name:"Play Sessions",emoji:"🏸"},
  {key:"Archery",aliases:["archery"],name:"Archery",emoji:"🏹"},
  {key:"Basketball",aliases:["basketball"],name:"Basketball",emoji:"🏀"},
  {key:"Roller Skating",aliases:["roller_skating"],name:"Roller Skating",emoji:"🛼"},
];

let counts={},exportLog=[];

const fetchAuth=(url,opts={})=>fetch(url,{...opts,credentials:"include"});

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function toast(msg,type="info"){
  const el=document.createElement("div");
  el.className=`toast ${type}`;
  el.innerHTML=`<span>${type==="success"?"✅":type==="error"?"❌":"ℹ️"}</span><span>${msg}</span>`;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(()=>{el.style.opacity="0";setTimeout(()=>el.remove(),300)},3500);
}

async function _handleGoogleLogin(response){
  try{
    const res=await fetchAuth(`${BASE_URL}/api/admin/google-login`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({credential:response.credential})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||"Login failed");
    document.getElementById("login-overlay").style.display="none";
    document.getElementById("main-app").style.display="block";
    toast("Login successful","success");
    loadAll();
  }catch(err){toast(err.message,"error")}
}

function googleSignIn(){
  if(typeof google==="undefined"||!google.accounts){toast("Google Sign-In not available. Refresh and try again.","error");return}
  google.accounts.id.prompt(n=>{if(n.isNotDisplayed()||n.isSkippedMoment())toast("Sign-in blocked. Try disabling shields for this site.","error")});
}

async function logout(){
  try{await fetchAuth(`${BASE_URL}/api/admin/logout`,{method:"POST"})}catch(_){}
  document.getElementById("login-overlay").style.display="flex";
  document.getElementById("main-app").style.display="none";
  if(typeof google!=="undefined")google.accounts.id.disableAutoSelect();
  toast("Logged out","info");
}

function handleUnauthorized(res){
  if(res.status===401||res.status===403){logout();throw new Error("Session expired. Please log in again.")}
}

async function loadCounts(){
  try{
    const res=await fetchAuth(`${BASE_URL}/api/admin/export-count?sport=all`);
    handleUnauthorized(res);
    if(!res.ok)throw new Error("Could not load counts");
    const data=await res.json();
    const raw=data.breakdown||{};
    counts={};
    Object.entries(raw).forEach(([k,v])=>{
      if(!k||k==="null"||k==="undefined")return;
      const match=SPORTS.find(s=>s.key===k||(s.aliases&&s.aliases.includes(k)));
      const fk=match?match.key:k;
      counts[fk]=(counts[fk]||0)+v;
    });
    renderSummary(data.total||0);
    renderCards(counts);
  }catch(err){toast(err.message,"error");renderCards({})}
}

function renderSummary(total){
  document.getElementById("total-count").textContent=total;
  document.getElementById("total-sub").textContent=total===0?"All leads exported — nothing pending":`${total} lead${total!==1?"s":""} waiting to be exported`;
}

function renderCards(breakdown){
  const grid=document.getElementById("cards-grid");
  grid.innerHTML="";
  SPORTS.forEach(sport=>{
    const count=breakdown[sport.key]||0;
    const card=document.createElement("div");
    card.className="sport-card";
    card.id=`card-${esc(sport.key)}`;
    card.innerHTML=`
      <div class="card-emoji">${sport.emoji}</div>
      <div class="card-info">
        <div class="card-name">${esc(sport.name)}</div>
        <div class="card-key">${esc(sport.key)}</div>
      </div>
      <div class="card-right">
        <div class="count-block">
          <div class="count-num${count===0?" zero":""}" id="count-${esc(sport.key)}">${count}</div>
          <div class="count-label">leads</div>
        </div>
        <button class="btn-dl" id="btn-${esc(sport.key)}"
          onclick="exportLeads('${esc(sport.key)}',this)" ${count===0?"disabled":""}>
          ⬇ CSV
        </button>
      </div>`;
    grid.appendChild(card);
  });
}

function tsFilename(k){
  const n=new Date(),p=x=>String(x).padStart(2,"0");
  return `psv_leads_${k}_${n.getFullYear()}${p(n.getMonth()+1)}${p(n.getDate())}_${p(n.getHours())}${p(n.getMinutes())}${p(n.getSeconds())}.csv`;
}

function sportLabel(k){
  if(k==="all")return"All Sports";
  const s=SPORTS.find(s=>s.key===k);
  return s?`${s.emoji} ${s.name}`:k;
}

function formatBreakdown(b={}){
  return Object.entries(b).filter(([,c])=>Number(c)>0).map(([k,c])=>`${sportLabel(k)} (${c})`).join(", ");
}

function normalizeEntry(e){
  const d=e.createdAt?new Date(e.createdAt):new Date();
  return{rawTime:d.getTime(),date:d.toLocaleDateString("en-IN"),time:d.toLocaleTimeString("en-IN"),sport:e.sport||"all",count:Number(e.count||0),breakdown:e.breakdown||{},filename:e.filename||"—",status:e.status||"exported",csvUrl:e.csvStorageUrl||null};
}

async function loadRecentExports(){
  try{
    const res=await fetchAuth(`${BASE_URL}/api/admin/recent-exports`);
    handleUnauthorized(res);
    if(!res.ok)throw new Error("Could not load recent exports");
    const data=await res.json();
    const old=exportLog;
    exportLog=(data.exports||[]).map(e=>{
      const n=normalizeEntry(e);
      if(!n.csvUrl&&n.status==="exported"){
        const ex=old.find(o=>o.time===n.time&&o.sport===n.sport&&o.csvUrl);
        if(ex)n.csvUrl=ex.csvUrl;
      }
      return n;
    });
    renderLog();
  }catch(err){toast(err.message,"error")}
}

async function exportLeads(sportKey,btn){
  const orig=btn.innerHTML,prev={...counts};
  btn.disabled=true;btn.innerHTML="⏳";
  const now=new Date(),ts=now.toLocaleTimeString("en-IN"),ds=now.toLocaleDateString("en-IN");
  try{
    const res=await fetchAuth(`${BASE_URL}/api/admin/export-leads?sport=${encodeURIComponent(sportKey)}`);
    handleUnauthorized(res);
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`HTTP ${res.status}`)}
    const leadCount=parseInt(res.headers.get("X-Lead-Count")||"0",10);
    const blob=await res.blob();
    const dlUrl=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const sf=res.headers.get("Content-Disposition")?.match(/filename="(.+)"/)?.[1];
    const filename=sf||tsFilename(sportKey);
    a.href=dlUrl;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);
    const csvUrl=URL.createObjectURL(blob);
    if(leadCount===0){
      toast(`No pending leads for ${sportLabel(sportKey)}`,"info");
      exportLog.unshift({rawTime:Date.now(),time:ts,date:ds,sport:sportKey,count:0,breakdown:sportKey==="all"?prev:{[sportKey]:0},filename,csvUrl:null,status:"empty"});
    }else{
      toast(`✓ ${leadCount} lead${leadCount!==1?"s":""} exported`,"success");
      if(sportKey==="all")Object.keys(counts).forEach(k=>{counts[k]=0});else counts[sportKey]=0;
      exportLog.unshift({rawTime:Date.now(),time:ts,date:ds,sport:sportKey,count:leadCount,breakdown:sportKey==="all"?Object.fromEntries(Object.entries(prev).filter(([,c])=>c>0)):{[sportKey]:leadCount},filename,csvUrl,status:"exported"});
      renderCards(counts);renderSummary(Object.values(counts).reduce((a,b)=>a+b,0));
    }
    renderLog();
    setTimeout(()=>loadRecentExports(),5000);
  }catch(err){
    toast(`Export failed: ${err.message}`,"error");
    exportLog.unshift({rawTime:Date.now(),time:ts,date:ds,sport:sportKey,count:0,filename:"—",csvUrl:null,status:"error"});
    renderLog();
  }finally{btn.innerHTML=orig;btn.disabled=false}
}

function badgeHTML(status){
  if(status==="exported")return`<span class="badge ok">Exported</span>`;
  if(status==="empty")return`<span class="badge empty">Empty</span>`;
  return`<span class="badge err">Error</span>`;
}

function renderLog(){
  const wrap=document.getElementById("log-wrap");
  if(exportLog.length===0){wrap.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div>No exports yet</div>`;return}
  wrap.innerHTML=exportLog.map((e,i)=>`
    <div class="log-entry">
      <div class="log-row">
        <div>
          <div class="log-lbl">Sport</div>
          <div class="log-val">${esc(sportLabel(e.sport))}</div>
        </div>
        ${badgeHTML(e.status)}
      </div>
      <div class="log-row">
        <div>
          <div class="log-lbl">Leads</div>
          <div class="log-val">${e.count}</div>
        </div>
        <div style="text-align:right">
          <div class="log-lbl">Date / Time</div>
          <div class="log-val" style="font-size:11px">${esc(e.date)} ${esc(e.time)}</div>
        </div>
      </div>
      ${e.csvUrl
        ?`<button class="btn-redl" onclick="reDownload(exportLog[${i}])">⬇ Re-download CSV</button>`
        :Date.now()-e.rawTime<15000&&e.status==="exported"
          ?`<div style="text-align:center;font-size:11px;color:var(--muted);margin-top:8px">Saving…</div>`
          :`<div style="text-align:center;font-size:11px;color:var(--muted);margin-top:8px">Expired</div>`
      }
    </div>`).join("");
}

async function loadAll(){
  const btn=document.getElementById("refresh-btn");
  btn?.classList.add("spinning");
  await Promise.all([loadCounts(),loadRecentExports()]);
  btn?.classList.remove("spinning");
}

function reDownload(e){
  if(!e||!e.csvUrl)return;
  const a=document.createElement("a");a.href=e.csvUrl;a.download=e.filename||"psv_leads_export.csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

async function init(){
  try{
    const res=await fetchAuth(`${BASE_URL}/api/admin/session`);
    if(res.ok){
      document.getElementById("login-overlay").style.display="none";
      document.getElementById("main-app").style.display="block";
      loadAll();
    }else throw new Error("no session");
  }catch(_){
    document.getElementById("login-overlay").style.display="flex";
    document.getElementById("main-app").style.display="none";
    renderCards({});renderSummary(0);
  }
}
init();
</script>
</body>
</html>
