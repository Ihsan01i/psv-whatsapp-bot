<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSV Sports — Lead Export</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0d0f12;
    --surface:    #14171c;
    --surface2:   #1c2028;
    --border:     #272c36;
    --border2:    #323844;
    --text:       #e8eaf0;
    --muted:      #6b7280;
    --accent:     #f0b429;
    --accent2:    #38bdf8;
    --green:      #4ade80;
    --red:        #f87171;
    --font-head:  'Syne', sans-serif;
    --font-mono:  'DM Mono', monospace;
    --radius:     10px;
    --radius-lg:  16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-head);
    min-height: 100vh;
    padding: 32px 24px 80px;
  }

  /* ── Layout ── */
  .container { max-width: 860px; margin: 0 auto; }

  /* ── Header ── */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .logo-text h1 {
    font-size: 18px; font-weight: 800;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .logo-text p {
    font-size: 12px; color: var(--muted); font-weight: 400;
    font-family: var(--font-mono);
  }

  /* Admin key input */
  .key-row {
    display: flex; align-items: center; gap: 8px;
  }
  .key-row label {
    font-size: 11px; font-family: var(--font-mono); color: var(--muted);
    white-space: nowrap;
  }
  .key-row input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 12px;
    width: 200px;
    outline: none;
    transition: border-color .2s;
  }
  .key-row input:focus { border-color: var(--accent2); }

  /* ── Section title ── */
  .section-title {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
  }

  /* ── Sport cards grid ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
    margin-bottom: 40px;
  }

  .sport-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: border-color .2s, transform .15s;
    position: relative;
    overflow: hidden;
  }
  .sport-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .3s ease;
  }
  .sport-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .sport-card:hover::before { transform: scaleX(1); }

  .card-top {
    display: flex; align-items: center; gap: 10px;
  }
  .card-emoji { font-size: 26px; line-height: 1; }
  .card-name {
    font-size: 15px; font-weight: 700;
    letter-spacing: -0.2px;
  }
  .card-key {
    font-size: 10px; font-family: var(--font-mono);
    color: var(--muted); margin-top: 1px;
  }

  .card-count {
    display: flex; align-items: baseline; gap: 6px;
  }
  .count-num {
    font-size: 36px; font-weight: 800;
    line-height: 1;
    color: var(--accent);
    transition: color .3s;
  }
  .count-num.zero { color: var(--muted); }
  .count-label {
    font-size: 11px; font-family: var(--font-mono);
    color: var(--muted);
  }

  /* Download button */
  .btn-download {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--accent);
    color: #0d0f12;
    border: none;
    border-radius: 8px;
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    padding: 10px 16px;
    cursor: pointer;
    transition: background .15s, opacity .15s, transform .1s;
    width: 100%;
  }
  .btn-download:hover { background: #f5c842; transform: scale(1.02); }
  .btn-download:active { transform: scale(0.98); }
  .btn-download:disabled {
    background: var(--surface2);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
  }
  .btn-download.loading {
    opacity: .7; pointer-events: none;
  }

  /* ── "Export All" row ── */
  .export-all-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }
  .export-all-info h3 { font-size: 15px; font-weight: 700; }
  .export-all-info p  { font-size: 12px; color: var(--muted); font-family: var(--font-mono); margin-top: 3px; }
  .total-badge {
    font-size: 28px; font-weight: 800; color: var(--accent2);
    font-family: var(--font-head);
  }

  .btn-export-all {
    display: flex; align-items: center; gap: 8px;
    background: transparent;
    color: var(--accent2);
    border: 1.5px solid var(--accent2);
    border-radius: 8px;
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    padding: 10px 20px;
    cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }
  .btn-export-all:hover {
    background: var(--accent2);
    color: #0d0f12;
  }
  .btn-export-all:disabled {
    opacity: .4; cursor: not-allowed;
  }

  /* ── Toast notifications ── */
  #toast-container {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 1000;
  }
  .toast {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    font-family: var(--font-mono);
    display: flex; align-items: center; gap: 10px;
    min-width: 260px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    animation: slideIn .2s ease;
    transition: opacity .3s, transform .3s;
  }
  .toast.success { border-color: var(--green); }
  .toast.error   { border-color: var(--red); }
  .toast.info    { border-color: var(--accent2); }
  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  /* ── Recent exports log ── */
  .log-section { margin-top: 40px; }
  .log-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-family: var(--font-mono);
  }
  .log-table th {
    text-align: left;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 10px;
    padding: 0 12px 10px;
    border-bottom: 1px solid var(--border);
  }
  .log-table td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }
  .log-table tr:last-child td { border-bottom: none; }
  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .badge.uploaded { background: rgba(74,222,128,.12); color: var(--green); }
  .badge.pending  { background: rgba(240,180,41,.12);  color: var(--accent); }

  /* ── Refresh button ── */
  .refresh-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted);
    font-family: var(--font-mono); font-size: 11px;
    padding: 6px 12px; cursor: pointer;
    transition: border-color .2s, color .2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { border-color: var(--border2); color: var(--text); }
  .refresh-btn.spinning svg { animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty state ── */
  .empty {
    text-align: center; padding: 48px 24px;
    color: var(--muted); font-family: var(--font-mono); font-size: 12px;
  }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🏆</div>
      <div class="logo-text">
        <h1>PSV Sports Academy</h1>
        <p>Lead Export Dashboard</p>
      </div>
    </div>
    <div class="key-row">
      <label>ADMIN KEY</label>
      <input type="password" id="adminKey" placeholder="Enter admin key…"
             value="" autocomplete="off">
    </div>
  </header>

  <!-- Export All -->
  <p class="section-title">Summary</p>
  <div class="export-all-row">
    <div class="export-all-info">
      <h3>All Pending Leads</h3>
      <p id="total-sub">Loading…</p>
    </div>
    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
      <span class="total-badge" id="total-count">—</span>
      <button class="btn-export-all" id="btn-all" onclick="exportLeads('all', this)">
        ⬇ Export All as CSV
      </button>
    </div>
  </div>

  <!-- Per-sport cards -->
  <p class="section-title">By Sport</p>
  <div class="cards-grid" id="cards-grid">
    <!-- Injected by JS -->
  </div>

  <!-- Recent exports log -->
  <div class="log-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <p class="section-title" style="margin:0">Recent Exports</p>
      <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M1 4v6h6M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        Refresh
      </button>
    </div>
    <div id="log-container">
      <div class="empty"><div class="empty-icon">📋</div>No exports yet this session</div>
    </div>
  </div>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
// ── Config ────────────────────────────────────────────────────
// Change this to your deployed backend URL in production
const BASE_URL = window.location.hostname === "localhost"
  ? "http://localhost:3000"
  : "";   // same-origin in production

// Sport definitions (mirrors sports.js — update if you add sports)
const SPORTS = [
  { key: "badminton_coaching", name: "Badminton Coaching", emoji: "🏸" },
  { key: "badminton_court",    name: "Court Booking",      emoji: "🏟️" },
  { key: "archery",            name: "Archery",            emoji: "🏹" },
  { key: "basketball",         name: "Basketball",         emoji: "🏀" },
  { key: "roller_skating",     name: "Roller Skating",     emoji: "🛼" },
];

// ── State ─────────────────────────────────────────────────────
let counts = {};
const exportLog = [];  // session-only log

// ── Helpers ───────────────────────────────────────────────────
const adminKey = () => document.getElementById("adminKey").value.trim();

function toast(msg, type = "info") {
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  const icon = type === "success" ? "✅" : type === "error" ? "❌" : "ℹ️";
  el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(() => {
    el.style.opacity = "0";
    el.style.transform = "translateX(20px)";
    setTimeout(() => el.remove(), 300);
  }, 3500);
}

// ── Load counts from backend ──────────────────────────────────
async function loadCounts() {
  const key = adminKey();
  if (!key) { renderCards({}); return; }

  try {
    const res = await fetch(`${BASE_URL}/api/export-count?sport=all`, {
      headers: { "x-admin-key": key },
    });
    if (!res.ok) throw new Error("Auth failed");
    const data = await res.json();
    counts = data.breakdown || {};
    renderSummary(data.total || 0);
    renderCards(counts);
  } catch (err) {
    toast("Could not load counts — check admin key", "error");
    renderCards({});
  }
}

function renderSummary(total) {
  document.getElementById("total-count").textContent = total;
  document.getElementById("total-sub").textContent =
    total === 0
      ? "All leads exported — nothing pending"
      : `${total} lead${total !== 1 ? "s" : ""} waiting to be exported`;
}

// ── Render sport cards ────────────────────────────────────────
function renderCards(breakdown) {
  const grid = document.getElementById("cards-grid");
  grid.innerHTML = "";

  SPORTS.forEach((sport) => {
    const count = breakdown[sport.key] || 0;
    const card = document.createElement("div");
    card.className = "sport-card";
    card.id = `card-${sport.key}`;
    card.innerHTML = `
      <div class="card-top">
        <span class="card-emoji">${sport.emoji}</span>
        <div>
          <div class="card-name">${sport.name}</div>
          <div class="card-key">${sport.key}</div>
        </div>
      </div>
      <div class="card-count">
        <span class="count-num ${count === 0 ? "zero" : ""}" id="count-${sport.key}">${count}</span>
        <span class="count-label">pending leads</span>
      </div>
      <button
        class="btn-download"
        id="btn-${sport.key}"
        onclick="exportLeads('${sport.key}', this)"
        ${count === 0 ? "disabled" : ""}
      >
        ⬇ Download CSV
      </button>
    `;
    grid.appendChild(card);
  });
}

// ── Export (download + mark uploaded) ────────────────────────
async function exportLeads(sportKey, btn) {
  const key = adminKey();
  if (!key) { toast("Enter your admin key first", "error"); return; }

  const originalText = btn.innerHTML;
  btn.classList.add("loading");
  btn.innerHTML = "⏳ Downloading…";

  try {
    const url = `${BASE_URL}/api/export-leads?sport=${encodeURIComponent(sportKey)}&adminKey=${encodeURIComponent(key)}`;
    const res  = await fetch(url, { headers: { "x-admin-key": key } });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    // Get count from header before streaming
    const leadCount = parseInt(res.headers.get("X-Lead-Count") || "0", 10);

    // Trigger browser download
    const blob     = await res.blob();
    const dlUrl    = URL.createObjectURL(blob);
    const a        = document.createElement("a");
    const filename = res.headers.get("Content-Disposition")
      ?.match(/filename="(.+)"/)?.[1]
      || `psv_leads_${sportKey}.csv`;

    a.href     = dlUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(dlUrl);

    if (leadCount === 0) {
      toast(`No pending leads for ${sportKey}`, "info");
    } else {
      toast(`✓ ${leadCount} lead${leadCount !== 1 ? "s" : ""} downloaded & marked as uploaded`, "success");

      // Update local counts
      if (sportKey === "all") {
        Object.keys(counts).forEach((k) => { counts[k] = 0; });
      } else {
        counts[sportKey] = 0;
      }

      // Log this export
      exportLog.unshift({
        time:     new Date().toLocaleTimeString("en-IN"),
        sport:    sportKey,
        count:    leadCount,
        filename,
      });
      renderLog();
      renderCards(counts);
      renderSummary(Object.values(counts).reduce((a, b) => a + b, 0));
    }

  } catch (err) {
    toast(`Export failed: ${err.message}`, "error");
  } finally {
    btn.classList.remove("loading");
    btn.innerHTML = originalText;
  }
}

// ── Render export log ─────────────────────────────────────────
function renderLog() {
  const container = document.getElementById("log-container");
  if (exportLog.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>No exports yet this session</div>`;
    return;
  }

  const table = document.createElement("table");
  table.className = "log-table";
  table.innerHTML = `
    <thead>
      <tr>
        <th>Time</th><th>Sport</th><th>Leads</th><th>File</th><th>Status</th>
      </tr>
    </thead>
    <tbody>
      ${exportLog.map((e) => `
        <tr>
          <td>${e.time}</td>
          <td>${e.sport}</td>
          <td>${e.count}</td>
          <td>${e.filename}</td>
          <td><span class="badge uploaded">Uploaded</span></td>
        </tr>
      `).join("")}
    </tbody>
  `;
  container.innerHTML = "";
  container.appendChild(table);
}

// ── Load everything ───────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");
  await loadCounts();
  btn.classList.remove("spinning");
}

// ── Auto-reload counts when admin key is entered ──────────────
document.getElementById("adminKey").addEventListener("change", loadAll);
document.getElementById("adminKey").addEventListener("keydown", (e) => {
  if (e.key === "Enter") loadAll();
});

// Initial render (empty state without key)
renderCards({});
renderSummary(0);
</script>
</body>
</html>
