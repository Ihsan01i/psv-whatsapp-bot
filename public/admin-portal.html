<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSV Sports — Secure Lead Export</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* ── Premium Modern Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark: #050505;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #FFB020;
      --accent-glow: rgba(255, 176, 32, 0.35);
      --surface-glass: rgba(255, 255, 255, 0.03);
      --border-glass: rgba(255, 255, 255, 0.08);
      --green: #4ade80;
      --red: #f87171;
      --font-head: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text);
      font-family: var(--font-head);
      min-height: 100vh;
      padding: 40px 24px 80px;
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Cosmic Glowing Background Orbs ── */
    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      z-index: -1;
      opacity: 0.6;
      pointer-events: none;
    }
    body::before {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(255, 176, 32, 0.15), transparent 70%);
      top: -200px; right: -150px;
    }
    body::after {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.08), transparent 70%);
      bottom: -100px; left: -200px;
    }

    /* ── Layout ── */
    .container { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }

    /* ── Typography & Headings ── */
    h1, h2, h3 { font-weight: 800; letter-spacing: -0.5px; }
    
    .section-title {
      font-size: 13px; font-family: var(--font-mono); color: var(--accent);
      text-transform: uppercase; letter-spacing: 2px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 16px;
      font-weight: 600;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border-glass); }

    /* ── Premium Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px;
      padding: 20px 32px; background: var(--surface-glass);
      border: 1px solid var(--border-glass); border-radius: 24px;
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      margin-bottom: 56px; box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
    }
    
    .logo { display: flex; align-items: center; gap: 18px; }
    .logo-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #FFB020, #f59e0b);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; box-shadow: 0 4px 24px var(--accent-glow);
    }
    .logo-text h1 { font-size: 22px; margin-bottom: 2px; }
    .logo-text p { font-size: 13px; color: var(--muted); font-family: var(--font-mono); }
    .user-row { display: flex; align-items: center; gap: 16px; }

    /* ── Login Overlay (Glassmorphism) ── */
    #login-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .login-card {
      background: rgba(20, 20, 25, 0.7); padding: 56px 40px;
      border-radius: 32px; border: 1px solid var(--border-glass);
      text-align: center; max-width: 440px; width: 90%;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
      position: relative; overflow: hidden;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #FFB020, #f59e0b, #38bdf8);
    }

    /* ── Summary Row ── */
    .export-all-row {
      background: var(--surface-glass); border: 1px solid var(--border-glass);
      border-radius: 28px; padding: 36px 40px; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 24px;
      margin-bottom: 56px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
    }
    .export-all-info h3 { font-size: 18px; margin-bottom: 6px; }
    .export-all-info p { color: var(--muted); font-family: var(--font-mono); font-size: 13px; }
    
    .total-badge { 
      font-size: 48px; font-weight: 800; color: #fff; 
      text-shadow: 0 0 24px rgba(255,176,32,0.4); font-family: var(--font-head);
    }
    
    .btn-export-all {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, #FFB020, #f59e0b); color: #000;
      border: none; border-radius: 14px; font-family: var(--font-head);
      font-size: 15px; font-weight: 700; padding: 16px 32px; cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 14px rgba(255, 176, 32, 0.2);
    }
    .btn-export-all:hover:not(:disabled) { transform: translateY(-4px); box-shadow: 0 12px 28px var(--accent-glow); }
    .btn-export-all:disabled { background: var(--surface-glass); color: var(--muted); box-shadow: none; cursor: not-allowed; }

    /* ── Cards Grid ── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-bottom: 64px; }
    
    .sport-card {
      background: var(--surface-glass); border: 1px solid var(--border-glass);
      border-radius: 28px; padding: 32px; display: flex; flex-direction: column; gap: 20px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      position: relative; overflow: hidden;
    }
    .sport-card:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 176, 32, 0.4);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4), 0 0 32px rgba(255, 176, 32, 0.1);
    }

    .card-top { display: flex; align-items: center; gap: 16px; }
    .card-emoji { 
      font-size: 32px; background: rgba(255,255,255,0.03); 
      padding: 14px; border-radius: 18px; border: 1px solid var(--border-glass); 
      box-shadow: inset 0 2px 10px rgba(255,255,255,0.02);
    }
    .card-name { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .card-key { font-size: 11px; font-family: var(--font-mono); color: var(--muted); }

    .card-count { display: flex; align-items: baseline; gap: 10px; margin: 12px 0 8px; }
    .count-num { font-size: 44px; font-weight: 800; color: var(--accent); line-height: 1; }
    .count-num.zero { color: var(--muted); }
    .count-label { font-size: 12px; font-family: var(--font-mono); color: var(--muted); }
    
    .btn-download {
      background: rgba(255, 255, 255, 0.04); color: #fff; border: 1px solid var(--border-glass);
      border-radius: 14px; font-family: var(--font-head); font-size: 14px; font-weight: 700;
      padding: 14px; cursor: pointer; transition: all 0.2s; margin-top: auto; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-download:hover:not(:disabled) { 
      background: #FFB020; color: #000; border-color: #FFB020; 
      box-shadow: 0 4px 16px var(--accent-glow); transform: scale(1.02);
    }
    .btn-download:active { transform: scale(0.98); }
    .btn-download:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-download.loading { opacity: 0.7; pointer-events: none; }

    /* ── Logs Section ── */
    .log-section { 
      background: var(--surface-glass); border: 1px solid var(--border-glass); 
      border-radius: 28px; padding: 40px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .log-table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); }
    .log-table th { 
      text-align: left; color: var(--muted); text-transform: uppercase; 
      letter-spacing: 1.5px; font-size: 11px; padding: 0 16px 16px; border-bottom: 1px solid var(--border-glass); 
    }
    .log-table td { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #e2e8f0; font-size: 13px; }
    .log-table tr:last-child td { border-bottom: none; }
    
    .badge {
      display: inline-flex; align-items: center; padding: 6px 12px;
      border-radius: 24px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge.uploaded { background: rgba(74, 222, 128, 0.12); color: var(--green); border: 1px solid rgba(74, 222, 128, 0.2); }

    /* ── Utils & Buttons ── */
    .refresh-btn { 
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.05); color: var(--text); 
      border: 1px solid var(--border-glass); padding: 10px 18px; 
      border-radius: 12px; font-family: var(--font-mono); font-size: 12px;
      cursor: pointer; transition: all 0.2s; 
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .refresh-btn.spinning svg { animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { text-align: center; padding: 64px 24px; color: var(--muted); font-family: var(--font-mono); font-size: 14px; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

    /* ── Toasts ── */
    #toast-container { position: fixed; bottom: 32px; right: 32px; display: flex; flex-direction: column; gap: 12px; z-index: 10000; }
    .toast {
      background: rgba(20, 20, 25, 0.95); border: 1px solid var(--border-glass); color: #fff;
      border-radius: 16px; padding: 16px 24px; font-family: var(--font-mono); font-size: 13px;
      display: flex; align-items: center; gap: 12px; min-width: 300px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
      animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); transition: all 0.3s;
    }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); }
    .toast.info { border-color: var(--accent); }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>

<body>

  <div id="login-overlay">
    <div class="login-card">
      <div class="logo-icon" style="margin: 0 auto 16px;">🏆</div>
      <h2 style="margin-bottom: 8px;">Admin Portal</h2>
      <p style="color:var(--muted); font-family:var(--font-mono); font-size:13px; margin-bottom: 24px;">
        Please sign in with your authorized Google account to continue.
      </p>

      <!-- NOTE: Must replace 'YOUR_GOOGLE_CLIENT_ID' with actual client ID -->
      <div id="g_id_onload" data-client_id="355609399092-n109let01cv75b7iaif6pokffh0sn03m.apps.googleusercontent.com"
        data-context="signin" data-ux_mode="popup" data-callback="handleGoogleLogin" data-auto_prompt="false">
      </div>

      <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
        data-text="signin_with" data-size="large" data-logo_alignment="center">
      </div>
    </div>
  </div>

  <div class="container" id="main-app" style="display: none;">

    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-icon">🏆</div>
        <div class="logo-text">
          <h1>PSV Sports Academy</h1>
          <p>Lead Export Dashboard</p>
        </div>
      </div>
      <div class="user-row" id="user-info">
        <span id="user-email" style="font-size:12px;font-family:var(--font-mono);color:var(--muted);"></span>
        <button class="refresh-btn" onclick="logout()">Logout</button>
      </div>
    </header>

    <!-- Export All -->
    <p class="section-title">Summary</p>
    <div class="export-all-row">
      <div class="export-all-info">
        <h3>All Pending Leads</h3>
        <p id="total-sub">Loading…</p>
      </div>
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <span class="total-badge" id="total-count">—</span>
        <button class="btn-export-all" id="btn-all" onclick="exportLeads('all', this)">
          ⬇ Export All as CSV
        </button>
      </div>
    </div>

    <!-- Per-sport cards -->
    <p class="section-title">By Sport</p>
    <div class="cards-grid" id="cards-grid">
      <!-- Injected by JS -->
    </div>

    <!-- Recent exports log -->
    <div class="log-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <p class="section-title" style="margin:0">Recent Exports</p>
        <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M1 4v6h6M23 20v-6h-6" />
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15" />
          </svg>
          Refresh
        </button>
      </div>
      <div id="log-container">
        <div class="empty">
          <div class="empty-icon">📋</div>No exports yet this session
        </div>
      </div>
    </div>

  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script>
    // ── Config ────────────────────────────────────────────────────
    const BASE_URL = window.location.hostname === "localhost"
      ? "http://localhost:3000"
      : "";

    const SPORTS = [
      { key: "badminton_coaching", name: "Badminton Coaching", emoji: "🏸" },
      { key: "badminton_court", name: "Court Booking", emoji: "🏟️" },
      { key: "archery", name: "Archery", emoji: "🏹" },
      { key: "basketball", name: "Basketball", emoji: "🏀" },
      { key: "roller_skating", name: "Roller Skating", emoji: "🛼" },
    ];

    // ── State ─────────────────────────────────────────────────────
    let counts = {};
    const exportLog = [];
    let jwtToken = localStorage.getItem("admin_token");

    // ── Helpers ───────────────────────────────────────────────────
    function toast(msg, type = "info") {
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      const icon = type === "success" ? "✅" : type === "error" ? "❌" : "ℹ️";
      el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
      document.getElementById("toast-container").appendChild(el);
      setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateX(20px)";
        setTimeout(() => el.remove(), 300);
      }, 3500);
    }

    const authHeaders = () => ({
      "Authorization": `Bearer ${jwtToken}`
    });

    // ── Auth Handling ──────────────────────────────────────────────
    async function handleGoogleLogin(response) {
      try {
        const res = await fetch(`${BASE_URL}/api/admin/google-login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ credential: response.credential })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Login failed");

        jwtToken = data.token;
        localStorage.setItem("admin_token", jwtToken);

        document.getElementById("user-email").textContent = data.email;
        document.getElementById("login-overlay").style.display = "none";
        document.getElementById("main-app").style.display = "block";

        toast("Login successful", "success");
        loadAll();
      } catch (err) {
        toast(err.message, "error");
      }
    }

    function logout() {
      localStorage.removeItem("admin_token");
      jwtToken = null;
      document.getElementById("login-overlay").style.display = "flex";
      document.getElementById("main-app").style.display = "none";
      toast("Logged out", "info");
    }

    function handleUnauthorized(res) {
      if (res.status === 401 || res.status === 403) {
        logout();
        throw new Error("Session expired or invalid. Please log in again.");
      }
    }

    // ── Load counts from backend ──────────────────────────────────
    async function loadCounts() {
      if (!jwtToken) return;

      try {
        const res = await fetch(`${BASE_URL}/api/admin/export-count?sport=all`, {
          headers: authHeaders(),
        });
        handleUnauthorized(res);
        if (!res.ok) throw new Error("Could not load counts");

        const data = await res.json();
        counts = data.breakdown || {};
        renderSummary(data.total || 0);
        renderCards(counts);
      } catch (err) {
        toast(err.message, "error");
        renderCards({});
      }
    }

    function renderSummary(total) {
      document.getElementById("total-count").textContent = total;
      document.getElementById("total-sub").textContent =
        total === 0
          ? "All leads exported — nothing pending"
          : `${total} lead${total !== 1 ? "s" : ""} waiting to be exported`;
    }

    // ── Render sport cards ────────────────────────────────────────
    function renderCards(breakdown) {
      const grid = document.getElementById("cards-grid");
      grid.innerHTML = "";

      SPORTS.forEach((sport) => {
        const count = breakdown[sport.key] || 0;
        const card = document.createElement("div");
        card.className = "sport-card";
        card.id = `card-${sport.key}`;
        card.innerHTML = `
      <div class="card-top">
        <span class="card-emoji">${sport.emoji}</span>
        <div>
          <div class="card-name">${sport.name}</div>
          <div class="card-key">${sport.key}</div>
        </div>
      </div>
      <div class="card-count">
        <span class="count-num ${count === 0 ? "zero" : ""}" id="count-${sport.key}">${count}</span>
        <span class="count-label">pending leads</span>
      </div>
      <button
        class="btn-download"
        id="btn-${sport.key}"
        onclick="exportLeads('${sport.key}', this)"
        ${count === 0 ? "disabled" : ""}
      >
        ⬇ Download CSV
      </button>
    `;
        grid.appendChild(card);
      });
    }

    // ── Export (download + mark uploaded) ────────────────────────
    async function exportLeads(sportKey, btn) {
      if (!jwtToken) return logout();

      const originalText = btn.innerHTML;
      btn.classList.add("loading");
      btn.innerHTML = "⏳ Downloading…";

      try {
        const url = `${BASE_URL}/api/admin/export-leads?sport=${encodeURIComponent(sportKey)}`;
        const res = await fetch(url, { headers: authHeaders() });

        handleUnauthorized(res);

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }

        // Get count from header before streaming
        const leadCount = parseInt(res.headers.get("X-Lead-Count") || "0", 10);

        // Trigger browser download
        const blob = await res.blob();
        const dlUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const filename = res.headers.get("Content-Disposition")
          ?.match(/filename="(.+)"/)?.[1]
          || `psv_leads_${sportKey}.csv`;

        a.href = dlUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(dlUrl);

        if (leadCount === 0) {
          toast(`No pending leads for ${sportKey}`, "info");
        } else {
          toast(`✓ ${leadCount} lead${leadCount !== 1 ? "s" : ""} downloaded & marked as uploaded`, "success");

          // Update local counts
          if (sportKey === "all") {
            Object.keys(counts).forEach((k) => { counts[k] = 0; });
          } else {
            counts[sportKey] = 0;
          }

          // Log this export
          exportLog.unshift({
            time: new Date().toLocaleTimeString("en-IN"),
            sport: sportKey,
            count: leadCount,
            filename,
          });
          renderLog();
          renderCards(counts);
          renderSummary(Object.values(counts).reduce((a, b) => a + b, 0));
        }

      } catch (err) {
        toast(`Export failed: ${err.message}`, "error");
      } finally {
        btn.classList.remove("loading");
        btn.innerHTML = originalText;
      }
    }

    // ── Render export log ─────────────────────────────────────────
    function renderLog() {
      const container = document.getElementById("log-container");
      if (exportLog.length === 0) {
        container.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>No exports yet this session</div>`;
        return;
      }

      const table = document.createElement("table");
      table.className = "log-table";
      table.innerHTML = `
    <thead>
      <tr>
        <th>Time</th><th>Sport</th><th>Leads</th><th>File</th><th>Status</th>
      </tr>
    </thead>
    <tbody>
      ${exportLog.map((e) => `
        <tr>
          <td>${e.time}</td>
          <td>${e.sport}</td>
          <td>${e.count}</td>
          <td>${e.filename}</td>
          <td><span class="badge uploaded">Uploaded</span></td>
        </tr>
      `).join("")}
    </tbody>
  `;
      container.innerHTML = "";
      container.appendChild(table);
    }

    // ── Load everything ───────────────────────────────────────────
    async function loadAll() {
      const btn = document.getElementById("refresh-btn");
      btn.classList.add("spinning");
      await loadCounts();
      btn.classList.remove("spinning");
    }

    // Init
    if (jwtToken) {
      document.getElementById("login-overlay").style.display = "none";
      document.getElementById("main-app").style.display = "block";
      // We can decode JWT to get email, or just say 'Admin' until they do an action.
      // For simplicity, we decode locally without validation just for UI, 
      // since server handles real validation.
      try {
        const payload = JSON.parse(atob(jwtToken.split('.')[1]));
        document.getElementById("user-email").textContent = payload.email || "Admin";
      } catch (e) {
        document.getElementById("user-email").textContent = "Admin";
      }
      loadAll();
    } else {
      renderCards({});
      renderSummary(0);
    }
  </script>
</body>

</html>
